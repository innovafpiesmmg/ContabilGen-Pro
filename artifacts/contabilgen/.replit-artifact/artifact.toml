kind = "web"
previewPath = "/"
title = "ContabilGen Pro"
version = "1.0.0"
id = "artifacts/contabilgen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25744
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/contabilgen run dev"

[services.env]
PORT = "25744"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/contabilgen", "run", "build"]
publicDir = "artifacts/contabilgen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
