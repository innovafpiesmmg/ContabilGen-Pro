openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ContabilGen Pro API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: settings
    description: AI provider settings
  - name: accounting
    description: Accounting universe generation
  - name: generations
    description: Saved generation management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Clear the session
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordBody'
      responses:
        '200':
          description: Reset email sent (or silently ignored if email not found).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password using a token from the reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordBody'
      responses:
        '200':
          description: Password reset successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid or expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current AI provider settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update AI provider settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSettings"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounting/generate:
    post:
      operationId: generateAccountingUniverse
      tags: [accounting]
      summary: Generate a new accounting universe
      description: Uses AI to generate a coherent accounting universe based on the given parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateUniverseRequest"
      responses:
        "200":
          description: Generated accounting universe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingUniverse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounting/generations:
    get:
      operationId: listGenerations
      tags: [generations]
      summary: List saved generations
      responses:
        "200":
          description: List of saved generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenerationSummary"

    post:
      operationId: saveGeneration
      tags: [generations]
      summary: Save a generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveGenerationRequest"
      responses:
        "201":
          description: Generation saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationSummary"

  /accounting/generations/{id}:
    get:
      operationId: getGeneration
      tags: [generations]
      summary: Get a saved generation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteGeneration
      tags: [generations]
      summary: Delete a saved generation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AuthUser:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    RegisterBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ForgotPasswordBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AiSettings:
      type: object
      properties:
        provider:
          type: string
          enum: [deepseek, shared_deepseek, openai]
          description: "Which AI provider to use for generation"
        deepseekApiKey:
          type: ["string", "null"]
          description: "DeepSeek API key"
        deepseekBaseUrl:
          type: string
          description: "DeepSeek API base URL"
        deepseekModel:
          type: string
          description: "DeepSeek model to use (e.g. deepseek-chat)"
        openaiApiKey:
          type: ["string", "null"]
          description: "OpenAI API key"
        openaiModel:
          type: string
          description: "OpenAI model to use (e.g. gpt-4.1-mini)"
        sharedDeepseekAvailable:
          type: boolean
          description: "Whether the admin has enabled the shared DeepSeek key"
        sharedDeepseekModel:
          type: ["string", "null"]
          description: "Model configured for the shared DeepSeek key"
      required:
        - provider
        - deepseekApiKey
        - deepseekBaseUrl
        - deepseekModel
        - openaiApiKey
        - openaiModel

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    GenerateUniverseRequest:
      type: object
      properties:
        taxRegime:
          type: string
          enum: [IVA, IGIC]
          description: "IVA for Peninsula/Baleares, IGIC for Canarias"
        sector:
          type: string
          enum: [Comercio, Servicios, Industria, Hostelería]
        complexity:
          type: string
          enum: [Avanzado]
        year:
          type: integer
          description: Fiscal year for the accounting universe
        companyName:
          type: ["string", "null"]
          description: Optional company name (AI will generate one if not provided)
        educationLevel:
          type: string
          enum: [Medio, Superior]
          description: "Medio = FP Grado Medio, Superior = FP Grado Superior"
        operationsPerMonth:
          type: integer
          minimum: 3
          maximum: 25
          description: "Number of journal entries per month to generate"
        includePayroll:
          type: boolean
          description: "Include payroll (nóminas) with IRPF and SS"
        includeSocialSecurity:
          type: boolean
          description: "Include monthly Social Security payments (TC1/TC2)"
        includeTaxLiquidation:
          type: boolean
          description: "Include quarterly VAT/IGIC and annual IS tax liquidations"
        includeBankLoan:
          type: boolean
          description: "Include a bank loan (préstamo bancario)"
        includeMortgage:
          type: boolean
          description: "Include a mortgage loan (hipoteca)"
        includeCreditPolicy:
          type: boolean
          description: "Include a credit policy (póliza de crédito)"
        includeFixedAssets:
          type: boolean
          description: "Include fixed assets with annual amortization"
        includeShareholdersInfo:
          type: boolean
          description: "Include shareholders/partners breakdown and capital structure"
        isNewCompany:
          type: boolean
          description: "True if the company is newly created (no opening balance needed)"
        includeInitialBalance:
          type: boolean
          description: "Include an opening balance sheet at the start of the fiscal year"
        includeShareholderAccounts:
          type: boolean
          description: "Include current account transactions with shareholders and administrators (551/553)"
        includeDividends:
          type: boolean
          description: "Include dividend distribution approved at the shareholders meeting"
        activity:
          type: ["string", "null"]
          description: "Optional sub-sector activity for contextualizing the exercises"
        includeWarehouse:
          type: boolean
          description: "Include warehouse cards (fichas de almacén) with PMP"
        includeExtraordinary:
          type: boolean
          description: "Include extraordinary expenses (siniestros, pérdidas inmovilizado)"
        startDate:
          type: string
          description: "Custom period start date (YYYY-MM-DD). If set, overrides the default Jan 1 of fiscal year."
        endDate:
          type: string
          description: "Custom period end date (YYYY-MM-DD). If set, overrides the default Dec 31 of fiscal year."
      required:
        - taxRegime
        - sector
        - complexity
        - year

    AccountingUniverse:
      type: object
      properties:
        companyProfile:
          $ref: "#/components/schemas/CompanyProfile"
        inventory:
          $ref: "#/components/schemas/Inventory"
        suppliers:
          type: array
          items:
            $ref: "#/components/schemas/Supplier"
        clients:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        bankLoan:
          $ref: "#/components/schemas/BankLoan"
        mortgage:
          $ref: "#/components/schemas/Mortgage"
        creditPolicy:
          $ref: "#/components/schemas/CreditPolicy"
        creditCardStatement:
          $ref: "#/components/schemas/CreditCardStatement"
        insurancePolicies:
          type: array
          items:
            $ref: "#/components/schemas/InsurancePolicy"
        casualtyEvent:
          $ref: "#/components/schemas/CasualtyEvent"
        payroll:
          $ref: "#/components/schemas/Payroll"
        socialSecurityPayments:
          type: array
          items:
            $ref: "#/components/schemas/SocialSecurityPayment"
        taxLiquidations:
          type: array
          items:
            $ref: "#/components/schemas/TaxLiquidation"
        fixedAssets:
          type: array
          items:
            $ref: "#/components/schemas/FixedAsset"
        shareholdersInfo:
          $ref: "#/components/schemas/ShareholdersInfo"
        initialBalanceSheet:
          $ref: "#/components/schemas/InitialBalanceSheet"
        shareholderAccounts:
          $ref: "#/components/schemas/ShareholderAccounts"
        dividendDistribution:
          $ref: "#/components/schemas/DividendDistribution"
        bankStatements:
          type: array
          items:
            $ref: "#/components/schemas/BankStatement"
        journalEntries:
          type: array
          items:
            $ref: "#/components/schemas/JournalEntry"
        serviceInvoices:
          type: array
          items:
            $ref: "#/components/schemas/ServiceInvoice"
        paymentReceipts:
          type: array
          items:
            $ref: "#/components/schemas/PaymentReceipt"
      required:
        - companyProfile
        - inventory
        - suppliers
        - clients
        - invoices
        - bankStatements
        - journalEntries

    CompanyProfile:
      type: object
      properties:
        name:
          type: string
        nif:
          type: string
        address:
          type: string
        city:
          type: string
        sector:
          type: string
        taxRegime:
          type: string
        fiscalYear:
          type: integer
        description:
          type: string
        companyType:
          type: string
          description: "Legal form: SL, SA, SLU, SCP, Autónomo, etc."
        legalForm:
          type: string
          description: "Full legal form name in Spanish"
      required:
        - name
        - nif
        - address
        - city
        - sector
        - taxRegime
        - fiscalYear
        - description

    InventoryItem:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        quantity:
          type: number
        unitCost:
          type: number
        totalCost:
          type: number
        accountCode:
          type: string
          description: "PGC account code (e.g. 300, 310)"
      required:
        - code
        - description
        - quantity
        - unitCost
        - totalCost
        - accountCode

    Inventory:
      type: object
      properties:
        initialInventory:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        finalInventory:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        initialTotal:
          type: number
        finalTotal:
          type: number
        stockVariation:
          type: number
          description: "Variación de existencias (positive = increase, negative = decrease)"
      required:
        - initialInventory
        - finalInventory
        - initialTotal
        - finalTotal
        - stockVariation

    Supplier:
      type: object
      properties:
        name:
          type: string
        nif:
          type: string
        address:
          type: string
        city:
          type: string
        accountCode:
          type: string
          description: "PGC account (400, 401)"
      required:
        - name
        - nif
        - address
        - city
        - accountCode

    Client:
      type: object
      properties:
        name:
          type: string
        nif:
          type: string
        address:
          type: string
        city:
          type: string
        accountCode:
          type: string
          description: "PGC account (430, 431)"
      required:
        - name
        - nif
        - address
        - city
        - accountCode

    InvoiceLine:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        discount:
          type: number
        subtotal:
          type: number
        taxRate:
          type: number
        taxAmount:
          type: number
        total:
          type: number
      required:
        - description
        - quantity
        - unitPrice
        - discount
        - subtotal
        - taxRate
        - taxAmount
        - total

    Invoice:
      type: object
      properties:
        invoiceNumber:
          type: string
        date:
          type: string
        type:
          type: string
          enum: [purchase, sale, rectification]
        partyName:
          type: string
        partyNif:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLine"
        subtotal:
          type: number
        taxBase:
          type: number
        taxAmount:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
          enum: [cash, transfer, check, promissory_note, credit]
        dueDate:
          type: ["string", "null"]
        journalNote:
          type: string
          description: "Explanation of accounting entries"
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
        accountCredits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
      required:
        - invoiceNumber
        - date
        - type
        - partyName
        - partyNif
        - lines
        - subtotal
        - taxBase
        - taxAmount
        - total
        - paymentMethod
        - dueDate
        - journalNote
        - accountDebits
        - accountCredits

    AccountEntry:
      type: object
      properties:
        accountCode:
          type: string
        accountName:
          type: string
        amount:
          type: number
        description:
          type: string
      required:
        - accountCode
        - accountName
        - amount

    AmortizationRow:
      type: object
      properties:
        period:
          type: integer
        date:
          type: string
        installment:
          type: number
        interest:
          type: number
        principal:
          type: number
        balance:
          type: number
      required:
        - period
        - date
        - installment
        - interest
        - principal
        - balance

    BankLoan:
      type: object
      properties:
        entity:
          type: string
        loanNumber:
          type: string
        principal:
          type: number
        annualRate:
          type: number
        termMonths:
          type: integer
        startDate:
          type: string
        monthlyInstallment:
          type: number
        amortizationTable:
          type: array
          items:
            $ref: "#/components/schemas/AmortizationRow"
        journalNote:
          type: string
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
        accountCredits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
      required:
        - entity
        - loanNumber
        - principal
        - annualRate
        - termMonths
        - startDate
        - monthlyInstallment
        - amortizationTable
        - journalNote
        - accountDebits
        - accountCredits

    CreditPolicy:
      type: object
      properties:
        entity:
          type: string
        policyNumber:
          type: string
        limit:
          type: number
        drawnAmount:
          type: number
        annualRate:
          type: number
        openingCommission:
          type: number
        unusedCommission:
          type: number
        startDate:
          type: string
        endDate:
          type: string
        interestAmount:
          type: number
        totalSettlement:
          type: number
        journalNote:
          type: string
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
        accountCredits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
      required:
        - entity
        - policyNumber
        - limit
        - drawnAmount
        - annualRate
        - openingCommission
        - unusedCommission
        - startDate
        - endDate
        - interestAmount
        - totalSettlement
        - journalNote
        - accountDebits
        - accountCredits

    CreditCardMovement:
      type: object
      properties:
        date:
          type: string
        description:
          type: string
        amount:
          type: number
        category:
          type: string
        accountCode:
          type: string
        accountName:
          type: string
      required:
        - date
        - description
        - amount
        - category
        - accountCode
        - accountName

    CreditCardStatement:
      type: object
      properties:
        cardNumber:
          type: string
        entity:
          type: string
        statementPeriod:
          type: string
        movements:
          type: array
          items:
            $ref: "#/components/schemas/CreditCardMovement"
        totalCharges:
          type: number
        settlementDate:
          type: string
        journalNote:
          type: string
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
        accountCredits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
      required:
        - cardNumber
        - entity
        - statementPeriod
        - movements
        - totalCharges
        - settlementDate
        - journalNote
        - accountDebits
        - accountCredits

    InsurancePolicy:
      type: object
      properties:
        policyNumber:
          type: string
        insurer:
          type: string
        type:
          type: string
        annualPremium:
          type: number
        startDate:
          type: string
        endDate:
          type: string
        prepaidExpense:
          type: number
          description: "Amount to defer to next period (cuenta 480)"
        journalNote:
          type: string
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
        accountCredits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
      required:
        - policyNumber
        - insurer
        - type
        - annualPremium
        - startDate
        - endDate
        - prepaidExpense
        - journalNote
        - accountDebits
        - accountCredits

    CasualtyEvent:
      type: object
      properties:
        date:
          type: string
        description:
          type: string
        assetAffected:
          type: string
        bookValue:
          type: number
        insuranceCompensation:
          type: number
        netLoss:
          type: number
        journalNote:
          type: string
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
        accountCredits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
      required:
        - date
        - description
        - assetAffected
        - bookValue
        - insuranceCompensation
        - netLoss
        - journalNote
        - accountDebits
        - accountCredits

    PayrollEmployee:
      type: object
      properties:
        name:
          type: string
        naf:
          type: string
        category:
          type: string
        grossSalary:
          type: number
        irpfRate:
          type: number
        irpfAmount:
          type: number
        ssEmployeeRate:
          type: number
        ssEmployeeAmount:
          type: number
        netSalary:
          type: number
        ssEmployerRate:
          type: number
        ssEmployerAmount:
          type: number
      required:
        - name
        - naf
        - category
        - grossSalary
        - irpfRate
        - irpfAmount
        - ssEmployeeRate
        - ssEmployeeAmount
        - netSalary
        - ssEmployerRate
        - ssEmployerAmount

    Payroll:
      type: object
      properties:
        month:
          type: string
        employees:
          type: array
          items:
            $ref: "#/components/schemas/PayrollEmployee"
        totalGross:
          type: number
        totalIrpf:
          type: number
        totalSsEmployee:
          type: number
        totalNetSalary:
          type: number
        totalSsEmployer:
          type: number
        totalLaborCost:
          type: number
        journalNote:
          type: string
        accountDebits:
          type: array
          items:
            $ref: "#/components/schemas/AccountEntry"
